name: Publish release

permissions:
  contents: read
  packages: write

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)build images for (e.g. 4.2.29, no v prefix)'
        required: true
        type: string

jobs:
  publish_release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        arch: [
            {
              docker_name: amd64,
              hass_name: amd64
            },
            {
              docker_name: arm64,
              hass_name: aarch64
            }
          ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ env.TAG }}

    # QEMU lets amd64 runners cross-build arm/arm64 layers
    - uses: docker/setup-qemu-action@v3

    # Buildx = Docker’s multi-arch builder front-end
    - uses: docker/setup-buildx-action@v3

    # Log in to GitHub Container Registry
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: Rbillon59
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/${{ matrix.arch.docker_name }}
        build-args: |
          BUILD_VERSION=${{ env.TAG }}
          BUILD_ARCH=${{ matrix.arch.hass_name }}
        tags: |
          ghcr.io/rbillon59/hass-n8n-${{ matrix.arch.hass_name }}:${{ env.TAG }}
          ghcr.io/rbillon59/hass-n8n-${{ matrix.arch.hass_name }}:latest
